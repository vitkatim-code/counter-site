<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Счётчик</title>

<style>
  :root{
    --neon: rgba(0,255,220,.55);
    --neon-strong: rgba(0,255,220,.85);
    --warn: rgba(255,70,70,.55);
    --txt: #fff3e8;
  }

  body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    text-align:center;
    font-family:"Arial Black", Arial, sans-serif;
    font-weight:900; /* ← весь текст жирный */
    color:#fff;

    /* ФОН ИЗ ИЗОБРАЖЕНИЯ */
    background: url("back.png") no-repeat center center fixed;
    background-size: cover;
    background-color: #0a0503;
  }

  /* затемнение поверх фона для читаемости */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
  }

  /* 21+ (оставили только сверху) */
  .corner{
    position:fixed;
    font-weight:900;
    font-size:22px;
    color:#ff6b6b;
    z-index:10;
    text-shadow:
      0 0 8px var(--warn),
      0 0 18px rgba(255,70,70,.25);
  }
  .top-left{top:15px;left:20px}
  .top-right{top:15px;right:20px}

  /* лого */
  .logo{
    position:fixed;
    top:55px;
    left:20px;
    width:160px;
    height:auto;
    z-index:10;
    display:block;
    filter: drop-shadow(0 0 10px rgba(0,0,0,.35));
  }
  .logo-fallback{
    position:fixed;top:55px;left:20px;
    width:160px;font-size:14px;color:#ffd2b3;
    z-index:10;display:none;
  }

  /* ===== ВСЮ “НАДПИСЬНУЮ” ЧАСТЬ ПОДНИМАЕМ ВЫШЕ РЮМОК ===== */
  .content{
    position:relative;
    transform: translateY(-100px); /* <-- подняли выше */
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .top-text{
    font-size:40px;
    text-shadow: 0 0 14px rgba(255,255,255,.10);
    margin-bottom:10px;
  }

  #counterWrap{
    position:relative;
    display:inline-block;
    margin:10px 0 14px;
  }

  #counter{
    font-size:150px;
    cursor:pointer;
    user-select:none;
    display:inline-block;
    transform-origin:center;
    will-change: transform, filter, opacity;
    color:var(--txt);
    text-shadow:
      0 0 10px rgba(255,190,120,.16),
      0 0 22px rgba(255,140,0,.14),
      0 0 34px var(--neon),
      0 0 60px rgba(0,255,220,.10);
  }

  /* ===== ПЛАВНЫЙ, МЕДЛЕННЫЙ “ВЗРЫВ” ДЛЯ ЦИФР ===== */
  .inflate{ animation: inflate 900ms cubic-bezier(.15,.9,.2,1) forwards; }
  @keyframes inflate{ 0%{transform:scale(1)} 100%{transform:scale(1.18)} }

  .vanish{ animation: vanish 820ms cubic-bezier(.2,.8,.2,1) forwards; }
  @keyframes vanish{
    0%{ opacity:1; transform: scale(1.18); }
    100%{ opacity:0; transform: scale(0.88); filter: blur(2.6px); }
  }

  .reveal{ animation: reveal 900ms cubic-bezier(.15,.9,.2,1) forwards; }
  @keyframes reveal{
    0%{ opacity:0; transform: scale(0.92); filter: blur(2.6px); }
    100%{ opacity:1; transform: scale(1); filter: blur(0px); }
  }

  .digit-fly{
    position:absolute; top:0; left:0;
    font:inherit;
    font-size:150px;
    line-height:1;
    color: var(--txt);
    pointer-events:none;
    transform-origin:center;
    will-change: transform, opacity, filter;
    text-shadow:
      0 0 6px rgba(255,190,120,.12),
      0 0 18px rgba(255,140,0,.14),
      0 0 22px var(--neon-strong),
      0 0 40px rgba(0,255,220,.18);
    animation: fly 3200ms cubic-bezier(.12,.85,.18,1) forwards; /* медленнее */
  }
  @keyframes fly{
    0%{
      opacity:1;
      transform: translate(var(--x), var(--y)) translate(0,0) rotate(0deg) scale(1.08);
      filter: blur(0px);
    }
    65%{
      opacity:1;
      transform: translate(var(--x), var(--y))
                 translate(calc(var(--dx)*.65), calc(var(--dy)*.65))
                 rotate(calc(var(--rot)*.65))
                 scale(0.98);
      filter: blur(0.45px);
    }
    100%{
      opacity:0;
      transform: translate(var(--x), var(--y))
                 translate(var(--dx), calc(var(--dy) + var(--grav)))
                 rotate(var(--rot))
                 scale(0.62);
      filter: blur(2.0px);
    }
  }

  .bottom-text{font-size:40px; margin-top:6px;}
  .info-text{
    margin-top:44px;
    font-size:24px;
    color:#ffe1cc;
  }

  .controls{
    position:absolute;
    bottom:40px;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    z-index:5;
  }

  input{
    width:110px;
    font-size:20px;
    text-align:center;
    padding:6px 8px;
    font-family:"Arial Black", Arial, sans-serif;
    border-radius:12px;
    border:1px solid rgba(255,180,120,.28);
    background:#0d0704;
    color:#fff;
    outline:none;
  }

  button{
    font-size:20px;
    padding:8px 16px;
    cursor:pointer;
    font-family:"Arial Black", Arial, sans-serif;
    border-radius:14px;
    border:1px solid rgba(255,180,120,.28);
    background:#0d0704;
    color:#fff;
  }

  .hidden{display:none !important;}

  @media (max-width: 600px){
    .content{ transform: translateY(-70px); }
    #counter{font-size:110px}
    .digit-fly{font-size:110px}
    .top-text,.bottom-text{font-size:28px}
    .info-text{font-size:18px;margin-top:34px}
    .logo{width:130px}
  }
</style>
</head>

<body>
  <div class="corner top-left">СТРОГО 21+</div>
  <div class="corner top-right">СТРОГО 21+</div>

  <img src="logo.png" class="logo" alt="Логотип"
       onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
  <div id="logoFallback" class="logo-fallback">LOGO НЕ НАЙДЕН<br>проверь logo.png</div>

  <div class="content">
    <div id="topText" class="top-text">Осталось выпить:</div>

    <div id="counterWrap">
      <div id="counter">250</div>
    </div>

    <div id="bottomText" class="bottom-text">Субботничных компаний</div>

    <div id="infoText" class="info-text">
      И пейте 31.03 "субботничную компанию" с 18:00 безлимитно.
    </div>
  </div>

  <div class="controls">
    <input type="number" id="numberInput" min="0" max="250" placeholder="0-250">
    <button id="setBtn" type="button">Установить</button>
    <button id="resetBtn" type="button">Сбросить на 250</button>
  </div>

<script>
  const counter = document.getElementById("counter");
  const counterWrap = document.getElementById("counterWrap");
  const topText = document.getElementById("topText");
  const bottomText = document.getElementById("bottomText");
  const infoText = document.getElementById("infoText");

  const numberInput = document.getElementById("numberInput");
  const setBtn = document.getElementById("setBtn");
  const resetBtn = document.getElementById("resetBtn");

  const STORAGE_KEY = "burito_counter_value_clean_v1";
  let value = 250;
  let animLock = false;

  const rand = (min, max) => Math.random() * (max - min) + min;

  // restore
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    const n = Number(saved);
    if (Number.isInteger(n) && n >= 0 && n <= 250) value = n;
  }

  function saveValue(){ localStorage.setItem(STORAGE_KEY, String(value)); }

  function setZeroMode(isZero){
    topText.classList.toggle("hidden", isZero);
    bottomText.classList.toggle("hidden", isZero);
    infoText.classList.toggle("hidden", isZero);
    counter.style.cursor = isZero ? "default" : "pointer";
  }

  function render(){
    if (value === 0){
      counter.textContent = "ВСЁ ВЫПИТО!";
      counter.style.fontSize = "90px";
      setZeroMode(true);
    } else {
      counter.textContent = String(value);
      counter.style.fontSize = "150px";
      setZeroMode(false);
    }
  }
  render();

  function flyDigits(text, mult = 1){
    const ghost = document.createElement("div");
    ghost.style.position = "absolute";
    ghost.style.left = "0";
    ghost.style.top = "0";
    ghost.style.visibility = "hidden";
    ghost.style.whiteSpace = "pre";
    ghost.style.font = getComputedStyle(counter).font;
    ghost.style.fontSize = getComputedStyle(counter).fontSize;
    ghost.style.lineHeight = getComputedStyle(counter).lineHeight;
    counterWrap.appendChild(ghost);

    const spans = [];
    for(const ch of text){
      const s = document.createElement("span");
      s.textContent = ch;
      ghost.appendChild(s);
      spans.push(s);
    }

    const wrapRect = counterWrap.getBoundingClientRect();

    spans.forEach((sp) => {
      const r = sp.getBoundingClientRect();
      const fly = document.createElement("div");
      fly.className = "digit-fly";
      fly.textContent = sp.textContent;

      const x = (r.left - wrapRect.left);
      const y = (r.top  - wrapRect.top);

      fly.style.setProperty("--x", x.toFixed(0) + "px");
      fly.style.setProperty("--y", y.toFixed(0) + "px");

      // мягче/медленнее: разлёт меньше, но длительность больше
      fly.style.setProperty("--dx", (rand(-420, 420) * mult).toFixed(0) + "px");
      fly.style.setProperty("--dy", (rand(-320, 260) * mult).toFixed(0) + "px");
      fly.style.setProperty("--rot", (rand(-240, 240) * mult).toFixed(0) + "deg");
      fly.style.setProperty("--grav", (rand(120, 460) * mult).toFixed(0) + "px");

      counterWrap.appendChild(fly);
      fly.addEventListener("animationend", () => fly.remove());
    });

    ghost.remove();
  }

  function applyValue(newValue){
    value = newValue;
    saveValue();
    render();
  }

  // Плавный “взрыв”: inflate -> vanish -> разлёт -> обновить -> reveal
  function playBoomAnimation(onDone, superBoom = false){
    if (animLock) return;
    animLock = true;

    const mult = superBoom ? 1.35 : 1;

    counter.classList.remove("vanish","reveal","inflate");
    counter.style.opacity = "1";
    counter.classList.add("inflate");

    setTimeout(() => {
      const currentText = counter.textContent;

      counter.classList.remove("inflate");
      counter.classList.add("vanish");

      // разлёт только для чисел (не для текста "ВСЁ ВЫПИТО!")
      if (value !== 0) flyDigits(currentText, mult);

      // меняем значение пока цифра “исчезает”
      setTimeout(() => { onDone?.(); }, 420);

      // потом плавно показываем новое
      setTimeout(() => {
        counter.classList.remove("vanish");
        counter.classList.add("reveal");

        setTimeout(() => {
          counter.classList.remove("reveal");
          animLock = false;
        }, 940);

      }, 980);
    }, 900);
  }

  counter.addEventListener("click", () => {
    if (value <= 0) return;
    const next = value - 1;
    const superBoom = (next === 0);
    playBoomAnimation(() => applyValue(next), superBoom);
  });

  function setValue(){
    const newValue = Number(numberInput.value);
    if (Number.isInteger(newValue) && newValue >= 0 && newValue <= 250) {
      const superBoom = (newValue === 0);
      playBoomAnimation(() => {
        applyValue(newValue);
        numberInput.value = "";
      }, superBoom);
    } else {
      alert("Введите число от 0 до 250");
    }
  }

  function resetTo250(){
    playBoomAnimation(() => applyValue(250), false);
  }

  setBtn.addEventListener("click", setValue);
  resetBtn.addEventListener("click", resetTo250);
  numberInput.addEventListener("keydown", (e) => { if (e.key === "Enter") setValue(); });
</script>

</body>
</html>
